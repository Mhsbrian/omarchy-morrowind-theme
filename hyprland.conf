$activeBorderColor = rgb(D9B167)

general {
    col.active_border = rgb(D9B167) rgb(8A6A34) rgb(F3D493) 45deg
    col.inactive_border = rgb(3E3423)
    border_size = 3
}

group {
    col.border_active = $activeBorderColor
}

animations {
    bezier = mwUnfurl, 0.16, 1, 0.3, 1
    bezier = mwEase, 0.25, 0.1, 0.25, 1
    bezier = mwLinear, 0, 0, 1, 1

    # Windows unfurl like a scroll being opened
    animation = windowsIn, 1, 6, mwUnfurl, popin 60%
    animation = windowsOut, 1, 3, mwEase, popin 75%
    animation = windowsMove, 1, 5, mwUnfurl

    # Launcher and menus unfurl too
    animation = layersIn, 1, 5, mwUnfurl, popin 70%
    animation = layersOut, 1, 2.5, mwLinear, fade

    animation = workspaces, 1, 5, mwUnfurl, slidefade 15%

    # Candlelight shimmer: the gold gradient slowly sweeps around the frame.
    # `loop` redraws continuously; change to `once` to save GPU/battery.
    animation = border, 1, 8, mwEase
    animation = borderangle, 1, 180, mwLinear, loop
}
